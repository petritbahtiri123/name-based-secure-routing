apiVersion: v1
kind: Namespace
metadata: {name: nbsr}
---
apiVersion: v1
kind: ConfigMap
metadata: {name: opa-policy, namespace: nbsr}
data:
  nbsr.rego: |
    package nbsr.route
    import rego.v1
    default decision := {"allow": false, "reason": "default deny", "policy_version": "2026-07-18.1", "allowed_methods": [], "allowed_path_prefix": "", "ticket_ttl": 60}
    decision := {"allow": true, "reason": "explicit grant", "policy_version": "2026-07-18.1", "allowed_methods": ["GET"], "allowed_path_prefix": "/api/payment-status", "ticket_ttl": 60} if {
      input.identity == "spiffe://nbsr.local/workload/client-allowed"
      input.service == "payments.internal"
      input.method == "GET"
      startswith(input.path, "/api/payment-status")
    }
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: opa, namespace: nbsr}
spec:
  replicas: 1
  selector: {matchLabels: {app: opa}}
  template:
    metadata: {labels: {app: opa}}
    spec:
      containers:
        - name: opa
          image: openpolicyagent/opa:1.4.2-static
          args: ["run", "--server", "--addr=0.0.0.0:8181", "/policy/nbsr.rego"]
          volumeMounts: [{name: policy, mountPath: /policy}]
      volumes: [{name: policy, configMap: {name: opa-policy}}]
---
apiVersion: v1
kind: Service
metadata: {name: opa, namespace: nbsr}
spec: {selector: {app: opa}, ports: [{port: 8181}]}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: payments-service, namespace: nbsr}
spec:
  replicas: 1
  selector: {matchLabels: {app: payments}}
  template:
    metadata: {labels: {app: payments}}
    spec:
      containers:
        - {name: payments, image: nbsr:local, args: ["nbsr.payments:app", "--host", "0.0.0.0", "--port", "7000"]}
---
apiVersion: v1
kind: Service
metadata: {name: payments-service, namespace: nbsr}
spec: {selector: {app: payments}, ports: [{port: 7000}]}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: control-plane, namespace: nbsr}
spec:
  replicas: 1
  selector: {matchLabels: {app: control-plane}}
  template:
    metadata: {labels: {app: control-plane}}
    spec:
      containers:
        - name: control-plane
          image: nbsr:local
          args: ["nbsr.control_plane:app", "--host", "0.0.0.0", "--port", "8000"]
          env:
            - {name: NBSR_OPA_URL, value: "http://opa:8181/v1/data/nbsr/route/decision"}
            - {name: NBSR_GATEWAY_URL, value: "http://localhost:8080"}
            - {name: NBSR_IDENTITY_PUBLIC_KEY_PATH, value: "/run/nbsr-secrets/identity-public.pem"}
            - {name: NBSR_TICKET_PRIVATE_KEY_PATH, value: "/run/nbsr-secrets/ticket-private.pem"}
          volumeMounts: [{name: keys, mountPath: /run/nbsr-secrets, readOnly: true}]
      volumes:
        - name: keys
          secret:
            secretName: nbsr-keys
            items:
              - {key: identity-public.pem, path: identity-public.pem}
              - {key: ticket-private.pem, path: ticket-private.pem}
---
apiVersion: v1
kind: Service
metadata: {name: control-plane, namespace: nbsr}
spec: {selector: {app: control-plane}, ports: [{port: 8000}]}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: name-control, namespace: nbsr}
spec:
  replicas: 1
  selector: {matchLabels: {app: name-control}}
  template:
    metadata: {labels: {app: name-control}}
    spec:
      containers:
        - name: name-control
          image: nbsr:local
          args:
            - nbsr.name_control:app
            - --host
            - 0.0.0.0
            - --port
            - "8444"
            - --ssl-certfile
            - /run/nbsr-tls/isp-control-cert.pem
            - --ssl-keyfile
            - /run/nbsr-tls/isp-control-key.pem
          env:
            - {name: NBSR_NAME_BINDING_PRIVATE_KEY_PATH, value: "/run/nbsr-signing/name-binding-private.pem"}
          volumeMounts:
            - {name: name-binding-private, mountPath: /run/nbsr-signing, readOnly: true}
            - {name: control-tls, mountPath: /run/nbsr-tls, readOnly: true}
      volumes:
        - name: name-binding-private
          secret:
            secretName: nbsr-name-binding-keys
            items: [{key: name-binding-private.pem, path: name-binding-private.pem}]
        - name: control-tls
          secret:
            secretName: nbsr-isp-tls
            items:
              - {key: isp-control-cert.pem, path: isp-control-cert.pem}
              - {key: isp-control-key.pem, path: isp-control-key.pem}
---
apiVersion: v1
kind: Service
metadata: {name: name-control, namespace: nbsr}
spec:
  type: NodePort
  selector: {app: name-control}
  ports: [{port: 8444, targetPort: 8444, nodePort: 30444}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: ticket-verifier, namespace: nbsr}
spec:
  replicas: 1
  selector: {matchLabels: {app: ticket-verifier}}
  template:
    metadata: {labels: {app: ticket-verifier}}
    spec:
      containers:
        - name: ticket-verifier
          image: nbsr:local
          args: ["nbsr.ticket_verifier:app", "--host", "0.0.0.0", "--port", "9000"]
          env:
            - {name: NBSR_TICKET_PUBLIC_KEY_PATH, value: "/run/nbsr-secrets/ticket-public.pem"}
          volumeMounts: [{name: keys, mountPath: /run/nbsr-secrets, readOnly: true}]
      volumes:
        - name: keys
          secret:
            secretName: nbsr-keys
            items: [{key: ticket-public.pem, path: ticket-public.pem}]
---
apiVersion: v1
kind: Service
metadata: {name: ticket-verifier, namespace: nbsr}
spec: {selector: {app: ticket-verifier}, ports: [{port: 9000}]}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: gateway, namespace: nbsr}
spec:
  replicas: 1
  selector: {matchLabels: {app: gateway}}
  template:
    metadata: {labels: {app: gateway}}
    spec:
      containers:
        - name: gateway
          image: envoyproxy/envoy:v1.34.4
          args: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "warning"]
          volumeMounts: [{name: config, mountPath: /etc/envoy, readOnly: true}]
      volumes: [{name: config, configMap: {name: envoy-config}}]
---
apiVersion: v1
kind: Service
metadata: {name: gateway, namespace: nbsr}
spec:
  type: NodePort
  selector: {app: gateway}
  ports: [{port: 8080, targetPort: 8080, nodePort: 30080}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: name-origin, namespace: nbsr}
spec:
  replicas: 1
  selector: {matchLabels: {app: name-origin}}
  template:
    metadata: {labels: {app: name-origin}}
    spec:
      hostname: facebook
      subdomain: test
      containers:
        - name: name-origin
          image: nbsr:local
          command: ["python", "-c"]
          args:
            - |
              import asyncio
              import ssl
              def observed_sni(_socket, server_name, _context):
                  print(f"ORIGIN_OBSERVED_SNI={server_name}", flush=True)
              async def respond(reader, writer, body):
                  peer = writer.get_extra_info("peername")
                  print(f"ORIGIN_OBSERVED_PEER={peer[0]}", flush=True)
                  try:
                      await reader.readuntil(b"\r\n\r\n")
                      response = b"HTTP/1.1 200 OK\r\nConnection: close\r\nContent-Length: " + str(len(body)).encode() + b"\r\n\r\n" + body
                      writer.write(response)
                      await writer.drain()
                  finally:
                      writer.close()
                      await writer.wait_closed()
              async def handle_http(reader, writer):
                  await respond(reader, writer, b"hidden-origin-http")
              async def handle_https(reader, writer):
                  await respond(reader, writer, b"hidden-origin-https")
              async def main():
                  tls = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)
                  tls.minimum_version = ssl.TLSVersion.TLSv1_3
                  tls.load_cert_chain("/run/nbsr-tls/isp-origin-cert.pem", "/run/nbsr-tls/isp-origin-key.pem")
                  tls.set_servername_callback(observed_sni)
                  http = await asyncio.start_server(handle_http, "0.0.0.0", 80)
                  https = await asyncio.start_server(handle_https, "0.0.0.0", 443, ssl=tls)
                  async with http, https:
                      await asyncio.gather(http.serve_forever(), https.serve_forever())
              asyncio.run(main())
          volumeMounts:
            - {name: origin-tls, mountPath: /run/nbsr-tls, readOnly: true}
      volumes:
        - name: origin-tls
          secret:
            secretName: nbsr-isp-tls
            items:
              - {key: isp-origin-cert.pem, path: isp-origin-cert.pem}
              - {key: isp-origin-key.pem, path: isp-origin-key.pem}
---
apiVersion: v1
kind: Service
metadata: {name: test, namespace: nbsr}
spec:
  clusterIP: None
  selector: {app: name-origin}
  ports: [{name: http, port: 80, targetPort: 80}, {name: https, port: 443, targetPort: 443}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: name-relay, namespace: nbsr}
spec:
  replicas: 1
  selector: {matchLabels: {app: name-relay}}
  template:
    metadata: {labels: {app: name-relay}}
    spec:
      containers:
        - name: name-relay
          image: nbsr:local
          command: ["python", "-c"]
          env:
            - {name: NBSR_NAME_BINDING_PUBLIC_KEY_PATH, value: "/run/nbsr-signing/name-binding-public.pem"}
          args:
            - |
              import asyncio
              import ssl
              from nbsr.config import Settings
              from nbsr.name_relay import NameRelay
              from nbsr.name_security import validate_name_binding_public_key
              async def main():
                  settings = Settings()
                  validate_name_binding_public_key(settings)
                  relay = NameRelay(settings=settings)
                  tls = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)
                  tls.minimum_version = ssl.TLSVersion.TLSv1_3
                  tls.load_cert_chain("/run/nbsr-tls/isp-relay-cert.pem", "/run/nbsr-tls/isp-relay-key.pem")
                  server = await asyncio.start_server(relay.handle, "0.0.0.0", 8443, ssl=tls)
                  async with server:
                      await server.serve_forever()
              asyncio.run(main())
          volumeMounts:
            - {name: name-binding-public, mountPath: /run/nbsr-signing, readOnly: true}
            - {name: relay-tls, mountPath: /run/nbsr-tls, readOnly: true}
      volumes:
        - name: name-binding-public
          secret:
            secretName: nbsr-name-binding-keys
            items: [{key: name-binding-public.pem, path: name-binding-public.pem}]
        - name: relay-tls
          secret:
            secretName: nbsr-isp-tls
            items:
              - {key: isp-relay-cert.pem, path: isp-relay-cert.pem}
              - {key: isp-relay-key.pem, path: isp-relay-key.pem}
---
apiVersion: v1
kind: Service
metadata: {name: name-relay, namespace: nbsr}
spec:
  type: NodePort
  selector: {app: name-relay}
  ports: [{port: 8443, targetPort: 8443, nodePort: 30443}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: default-deny, namespace: nbsr}
spec: {podSelector: {}, policyTypes: [Ingress, Egress]}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: payments-from-gateway-only, namespace: nbsr}
spec:
  podSelector: {matchLabels: {app: payments}}
  policyTypes: [Ingress]
  ingress:
    - from: [{podSelector: {matchLabels: {app: gateway}}}]
      ports: [{port: 7000, protocol: TCP}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: name-origin-from-relay-only, namespace: nbsr}
spec:
  podSelector: {matchLabels: {app: name-origin}}
  policyTypes: [Ingress]
  ingress:
    - from: [{podSelector: {matchLabels: {app: name-relay}}}]
      ports: [{port: 80, protocol: TCP}, {port: 443, protocol: TCP}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: name-control-ingress, namespace: nbsr}
spec:
  podSelector: {matchLabels: {app: name-control}}
  policyTypes: [Ingress]
  ingress:
    - ports: [{port: 8444, protocol: TCP}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: name-relay-ingress, namespace: nbsr}
spec:
  podSelector: {matchLabels: {app: name-relay}}
  policyTypes: [Ingress]
  ingress:
    - ports: [{port: 8443, protocol: TCP}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: allow-required-flows, namespace: nbsr}
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to: [{namespaceSelector: {}}]
      ports:
        - {port: 53, protocol: UDP}
        - {port: 53, protocol: TCP}
        - {port: 80, protocol: TCP}
        - {port: 443, protocol: TCP}
        - {port: 7000, protocol: TCP}
        - {port: 8181, protocol: TCP}
        - {port: 9000, protocol: TCP}
