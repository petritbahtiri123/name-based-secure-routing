name: nbsr
services:
  opa:
    image: openpolicyagent/opa:1.4.2-static
    command: ["run", "--server", "--addr=0.0.0.0:8181", "/policy"]
    volumes: ["./policy:/policy:ro"]
    networks: [control-network]
    healthcheck:
      test: ["CMD", "/opa", "eval", "1"]
      interval: 3s
      timeout: 2s
      retries: 20

  control-plane:
    build: .
    command: ["nbsr.control_plane:app", "--host", "0.0.0.0", "--port", "8000"]
    ports: ["8000:8000"]
    environment:
      NBSR_OPA_URL: http://opa:8181/v1/data/nbsr/route/decision
      NBSR_GATEWAY_URL: http://localhost:8080
      NBSR_TICKET_TTL_SECONDS: ${NBSR_TICKET_TTL_SECONDS:-60}
    volumes:
      - ./secrets/identity-public.pem:/run/secrets/identity-public.pem:ro
      - ./secrets/ticket-private.pem:/run/secrets/ticket-private.pem:ro
    networks: [client-network, control-network]
    depends_on:
      opa: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 3s
      timeout: 2s
      retries: 20

  ticket-verifier:
    build: .
    command: ["nbsr.ticket_verifier:app", "--host", "0.0.0.0", "--port", "9000"]
    volumes: ["./secrets/ticket-public.pem:/run/secrets/ticket-public.pem:ro"]
    networks: [protected-network]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 3s
      timeout: 2s
      retries: 20

  payments-service:
    build: .
    command: ["nbsr.payments:app", "--host", "0.0.0.0", "--port", "7000"]
    networks: [protected-network]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7000/health')"]
      interval: 3s
      timeout: 2s
      retries: 20

  gateway:
    image: envoyproxy/envoy:v1.34.4
    command: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "warning"]
    ports: ["8080:8080"]
    volumes: ["./gateway/envoy.yaml:/etc/envoy/envoy.yaml:ro"]
    networks: [client-network, protected-network]
    depends_on:
      ticket-verifier: { condition: service_healthy }
      payments-service: { condition: service_healthy }

  name-control:
    build: .
    command:
      - nbsr.name_control:app
      - --host
      - 0.0.0.0
      - --port
      - "8444"
      - --ssl-certfile
      - /run/secrets/isp-control-cert.pem
      - --ssl-keyfile
      - /run/secrets/isp-control-key.pem
    ports: ["8444:8444"]
    volumes:
      - ./secrets/name-binding-private.pem:/run/secrets/name-binding-private.pem:ro
      - ./secrets/isp-ca.pem:/run/secrets/isp-ca.pem:ro
      - ./secrets/isp-control-cert.pem:/run/secrets/isp-control-cert.pem:ro
      - ./secrets/isp-control-key.pem:/run/secrets/isp-control-key.pem:ro
    networks: [client-network]
    healthcheck:
      test: ["CMD", "python", "-c", "import ssl,urllib.request; c=ssl.create_default_context(cafile='/run/secrets/isp-ca.pem'); urllib.request.urlopen('https://localhost:8444/health', context=c)"]
      interval: 3s
      timeout: 2s
      retries: 20

  name-origin:
    build: .
    entrypoint: ["python", "-c"]
    command:
      - |
        import asyncio
        import ssl
        def observed_sni(_socket, server_name, _context):
            print(f"ORIGIN_OBSERVED_SNI={server_name}", flush=True)
        async def respond(reader, writer, body):
            peer = writer.get_extra_info("peername")
            print(f"ORIGIN_OBSERVED_PEER={peer[0]}", flush=True)
            try:
                await reader.readuntil(b"\r\n\r\n")
                response = b"HTTP/1.1 200 OK\r\nConnection: close\r\nContent-Length: " + str(len(body)).encode() + b"\r\n\r\n" + body
                writer.write(response)
                await writer.drain()
            finally:
                writer.close()
                await writer.wait_closed()
        async def handle_http(reader, writer):
            await respond(reader, writer, b"hidden-origin-http")
        async def handle_https(reader, writer):
            await respond(reader, writer, b"hidden-origin-https")
        async def main():
            tls = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)
            tls.minimum_version = ssl.TLSVersion.TLSv1_3
            tls.load_cert_chain("/run/secrets/isp-origin-cert.pem", "/run/secrets/isp-origin-key.pem")
            tls.set_servername_callback(observed_sni)
            http = await asyncio.start_server(handle_http, "0.0.0.0", 80)
            https = await asyncio.start_server(handle_https, "0.0.0.0", 443, ssl=tls)
            async with http, https:
                await asyncio.gather(http.serve_forever(), https.serve_forever())
        asyncio.run(main())
    volumes:
      - ./secrets/isp-ca.pem:/run/secrets/isp-ca.pem:ro
      - ./secrets/isp-origin-cert.pem:/run/secrets/isp-origin-cert.pem:ro
      - ./secrets/isp-origin-key.pem:/run/secrets/isp-origin-key.pem:ro
    networks:
      protected-network:
        aliases: [facebook.test]
    healthcheck:
      test: ["CMD", "python", "-c", "import socket,ssl; socket.create_connection(('localhost',80),2).close(); c=ssl.create_default_context(cafile='/run/secrets/isp-ca.pem'); c.wrap_socket(socket.socket(),server_hostname='facebook.test').connect(('localhost',443))"]
      interval: 3s
      timeout: 2s
      retries: 20

  name-relay:
    build: .
    entrypoint: ["python", "/opt/nbsr/name-relay/app.py", "serve"]
    ports: ["8443:8443"]
    volumes:
      - ./services/name-relay:/opt/nbsr/name-relay:ro
      - ./secrets/name-binding-public.pem:/run/secrets/name-binding-public.pem:ro
      - ./secrets/isp-ca.pem:/run/secrets/isp-ca.pem:ro
      - ./secrets/isp-relay-cert.pem:/run/secrets/isp-relay-cert.pem:ro
      - ./secrets/isp-relay-key.pem:/run/secrets/isp-relay-key.pem:ro
    networks: [client-network, protected-network]
    depends_on:
      name-origin: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import socket,ssl; c=ssl.create_default_context(cafile='/run/secrets/isp-ca.pem'); s=c.wrap_socket(socket.socket(), server_hostname='name-relay'); s.settimeout(2); s.connect(('localhost', 8443)); s.close()"]
      interval: 3s
      timeout: 2s
      retries: 20

  client-allowed:
    build: .
    entrypoint: ["python", "-m", "nbsr.demo_client"]
    profiles: [demo]
    volumes: ["./tokens:/run/tokens:ro"]
    networks: [client-network]
    depends_on:
      control-plane: { condition: service_healthy }
      gateway: { condition: service_started }

  client-denied:
    extends: client-allowed
    command: ["--identity", "denied"]

networks:
  client-network: {}
  control-network:
    internal: true
  protected-network:
    internal: true
